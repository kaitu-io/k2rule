name: Generate Rules

on:
  push:
    branches: [master]
  schedule:
    - cron: '0 23 * * *'  # Daily at 7:00 AM Beijing time
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Run tests
        run: go test ./...

      - name: Generate rules
        run: |
          mkdir -p output
          go run ./cmd/k2rule-gen generate-all -o output/ -v

      - name: Generate porn domain list
        run: |
          go run ./cmd/k2rule-gen generate-porn -o output/porn_domains.k2r.gz -v

      - name: Show generated files
        run: ls -lh output/*.k2r.gz

      - name: Deploy to release branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan release-temp
          git rm -rf .
          cp output/*.k2r.gz .
          git add *.k2r.gz
          git commit -m "Update rules $(date +'%Y-%m-%d')"
          git push origin HEAD:release --force

      - name: Wait for jsDelivr metadata cache
        run: |
          echo "Waiting 10 minutes for jsDelivr internal cache to refresh..."
          sleep 600

      - name: Purge jsDelivr cache
        run: |
          for file in output/*.k2r.gz; do
            name=$(basename "$file")
            echo -n "Purging ${name}... "
            response=$(curl -s -w "%{http_code}" "https://purge.jsdelivr.net/gh/kaitu-io/k2rule@release/${name}")
            echo "HTTP ${response: -3}"
            sleep 2
          done
