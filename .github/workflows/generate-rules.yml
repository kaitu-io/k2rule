name: Generate Rules

on:
  push:
    branches: [master]
  schedule:
    - cron: '0 23 * * *'  # Daily at 7:00 AM Beijing time
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Run tests
        run: go test ./...

      - name: Generate rules
        run: |
          mkdir -p output
          go run ./cmd/k2rule-gen generate-all -o output/ -v

      - name: Generate porn domain list
        run: |
          go run ./cmd/k2rule-gen generate-porn -o output/porn_domains.k2r.gz -v

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rule-binaries
          path: output/*.k2r.gz
          retention-days: 30

      - name: Create release tag
        id: tag
        run: |
          TAG="rules-$(date +'%Y%m%d')"
          DATE="$(date +'%Y-%m-%d')"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "date=${DATE}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Rules ${{ steps.tag.outputs.date }}
          body: |
            Automatically generated rule binaries for ${{ steps.tag.outputs.date }}

            ## Files
            - `cn_blacklist.k2r.gz` - Blacklist mode (K2RULEV3 format)
            - `cn_whitelist.k2r.gz` - Whitelist mode (K2RULEV3 format)
            - `porn_domains.k2r.gz` - Porn domain blocklist (K2RULEV3 format)
          files: output/*.k2r.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to release branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan release-temp
          git rm -rf .
          cp output/*.k2r.gz .
          git add *.k2r.gz
          git commit -m "Update rules $(date +'%Y-%m-%d')"
          git push origin HEAD:release --force
